<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Cars | Inicio</title>

<!-- SEO: descripción y palabras clave para buscadores -->
<meta name="description" content="Somos tu mejor opción en pintura automotriz, latonería, polichada y recubrimiento cerámico. Calidad de lujo en cada detalle.">
<meta name="keywords" content="taller automotriz, pintura de carros, latonería, polichada, cerámica automotriz, lujo">

<!-- Open Graph: previsualización al compartir en redes -->
<meta property="og:title" content="Luxury Cars | Inicio">
<meta property="og:description" content="Somos tu mejor opción en pintura y servicios automotrices de lujo.">
<meta property="og:image" content="img/hero/taller-1.jpg">
<meta property="og:url" content="https://tudominio.com/">
<meta property="og:type" content="website">

<!-- Favicon: icono en la pestaña del navegador -->
<link rel="icon" type="image/png" sizes="48x48" href="img/favicon.png">

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self'; connect-src 'self';">

<!-- ============================================
     GOOGLE FONTS: Advent Pro
     Esta línea le dice al navegador: "antes de
     pintar la página, ve a buscar esta fuente".
     wght@300..700 = trae varios grosores (pesos)
     de una sola vez, para no pedir uno por uno.
     ============================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Advent+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <!-- ============================================
       HEADER: este bloque se repite IDÉNTICO en
       las 4 páginas (index, servicios, inventario,
       contacto). Por ahora lo copiamos manualmente;
       más adelante te muestro cómo evitar esto.
       ============================================ -->
  <header>
    <div class="logo">
      <img src="img/logo.png" alt="Logo Luxury Cars" class="logo-img">
    </div>
    <nav>
      <ul>
        <!-- class="activo" marca en cuál página estamos -->
        <li><a href="index.html" class="activo">Inicio</a></li>
        <li><a href="servicios.html">Servicios</a></li>
        <li><a href="inventario.html">Inventario</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">

    <div class="carrusel">
      <div class="slide activa" style="background-image: url('img/hero/taller-1.jpg');"></div>
      <div class="slide" style="background-image: url('img/hero/taller-2.jpg');"></div>
      <div class="slide" style="background-image: url('img/hero/taller-3.jpg');"></div>
      <div class="slide" style="background-image: url('img/hero/taller-4.jpg');"></div>
      <div class="slide" style="background-image: url('img/hero/taller-5.jpg');"></div>
    </div>

    <div class="overlay-oscuro"></div>

    <button class="flecha flecha-izq" id="btn-anterior">&#10094;</button>
    <button class="flecha flecha-der" id="btn-siguiente">&#10095;</button>

    <div class="hero-indicadores" id="hero-indicadores"></div>

    <div class="hero-contenido">
      <h1>Lujo Automotriz <span>Hecho a Mano</span></h1>
      <p>Pintura · Latonería · Cerámica · Polichada</p>
      <div class="hero-botones">
        <a href="servicios.html" class="btn btn-primario">Ver Servicios</a>
        <a href="inventario.html" class="btn btn-secundario">Inventario</a>
      </div>
    </div>

  </section>

  <script src="js/script.js"></script>

  <footer>
    <p>&copy; 2026 Luxury Cars. Todos los derechos reservados.</p>
  </footer>

</body>
</html>
